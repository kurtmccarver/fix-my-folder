name: Build Windows App

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Build icon
        run: python tools/build_icon.py

      - name: Build executable
        run: |
          pyinstaller --clean --noconfirm FixMyFolder.spec
          Copy-Item -Force dist\FixMyFolder.exe fixmyfolder-portable.exe

      - name: Install Inno Setup
        run: choco install innosetup --yes --no-progress

      - name: Build installer
        run: |
          & "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe" installer.iss

      - name: Upload executable artifact
        uses: actions/upload-artifact@v4
        with:
          name: FixMyFolder-Windows
          path: fixmyfolder-portable.exe

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: FixMyFolder-Windows-Installer
          path: installer/FixMyFolderSetup.exe

      - name: Attach app files to GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            fixmyfolder-portable.exe
            installer/FixMyFolderSetup.exe
